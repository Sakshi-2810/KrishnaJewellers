/* ===============================
PRINT STYLES
================================ */
@media print {
    @page {
        size: A4;
        margin: 5mm;
    }

    /* Hide non-essential UI */
    .sidebar,
    .menu-btn,
    .btn-primary,
    .no-print,
    #add-item-btn {
        display: none !important;
    }

    /* Body clean up */
    body {
        background: white !important;
        font-size: 11px;
        color: #111;
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    /* Main content takes full width */
    .main-content {
        margin: 0;
        padding: 0;
    }

    /* Cards without borders or shadows */
    .card {
        border: none !important;
        box-shadow: none !important;
        padding: 5px 0 !important;
        margin-bottom: 5px !important;
        page-break-inside: avoid;
    }

    /* Headings smaller */
    h1, h2, h3 {
        color: #111;
        margin: 2px 0 !important;
        page-break-after: avoid;
    }
    h1 { font-size: 16px !important; }
    h3 { font-size: 13px !important; }

    /* Labels & inputs */
    .label {
        font-size: 10px !important;
        margin-bottom: 2px !important;
    }
    .form-input, textarea {
        font-size: 10px !important;
        padding: 4px !important;
         border: none !important;
        background: transparent !important; /* optional, to match page background */
        resize: none !important; /* optional, prevent resize handles in print */
        background: #fff !important;
    }

    /* Grid for 2-column layout */
    .grid {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 4px !important;
    }

    textarea {
        grid-column: span 2 !important;
        height: 40px !important;
    }

    /* Items rows */
    .item-row {
        display: grid !important;
        grid-template-columns: repeat(4, 1fr) !important;
        gap: 4px !important;
        padding: 4px !important;
        border: none !important;
        background: transparent !important;
    }

    /* Signature pad smaller */
    #signature-pad {
        height: 60px !important;
        border: 1px solid #000 !important;
    }
/* Proprietor Logo at top-right */

document.getElementById('mortgage-form').onsubmit = async (e) => {
    e.preventDefault();

    const btn = e.target.querySelector('button[type="submit"]');
    const loader = btn.querySelector('.loader');
    const btnText = btn.querySelector('.btn-text');

    // Show loader
    loader.classList.remove('hidden');
    btnText.classList.add('hidden');
    btn.disabled = true;

    try {
        const itemElements = document.querySelectorAll('.item-row');

        const items = Array.from(itemElements).map(row => ({
            name: row.querySelector('.item-name').value,
            grossWeight: parseFloat(row.querySelector('.item-gross').value || 0),
            netWeight: parseFloat(row.querySelector('.item-net').value || 0),
            purity: row.querySelector('.item-purity').value
        }));

        const canvas = document.getElementById("signature-pad");
        const signatureBase64 = canvas.toDataURL();

        const formData = {
            customerDetails: {
                id: document.getElementById("customerId").value || null,
                name: document.getElementById('cName').value,
                fatherName: document.getElementById('cFather').value,
                address: document.getElementById('cAddress').value,
                phoneNumber: document.getElementById('cPhone').value,
                aadharNumber: document.getElementById('cAadhar').value
            },
            itemList: items,
            proprietor: document.getElementById("cProprietor").value || null,
            estValue: parseInt(document.getElementById('estValue').value || 0),
            amountPaid: parseInt(document.getElementById('amountPaid').value || 0),
            createdAt: document.getElementById('createdAt').value,
            signatureBase64: signatureBase64,
            signatureType: mode,
            settled: false
        };

        if(mortgageId) formData.id = mortgageId;

        await ApiService.saveMortgage(formData);

        alert("Mortgage Saved Successfully / गिरवी सफलतापूर्वक सेव हुई");
        window.location.href = "morgate.html";

    } catch(err) {
        console.error(err);
        alert("Error Saving Mortgage / गिरवी सेव नहीं हुई " + err.message);
    } finally {
        // Hide loader
        loader.classList.add('hidden');
        btnText.classList.remove('hidden');
        btn.disabled = false;
    }
};

function fillCreatedAt(date){

const d = new Date(date).toISOString().split('T')[0];

document.getElementById("createdAt").value = d;

function fillProprietor(pId){
    const select = document.getElementById("cProprietor");
    select.value = pId || "";
    const selected = select.selectedOptions[0];
    const logo = document.getElementById("proprietorLogo");

    }
}

document.getElementById("btn-scan-finger").onclick = async () => {
    try {
        // 1. Define the capture request XML (Standard for most RD services)
        const captureXML = `<?xml version="1.0"?> <Opts fCount="1" fType="1" iCount="0" pCount="0" format="0" pidVer="2.0" timeout="10000" posh="UNKNOWN" env="P" />`;

        // 2. Call the local RD Service (Port 11100 is common for Mantra/Startek)
        // You may need to loop through ports 11100-11105 to find the device
        const response = await fetch("http://127.0.0.1:11100/rd/capture", {
            method: "CAPTURE", // Some services use POST, some use CAPTURE
            body: captureXML
        });

        const data = await response.text();
        
        // 3. Parse the XML response to get the image
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(data, "text/xml");
        
        // This depends on your specific scanner's SDK. 
        // Most return a Base64 string in a <Data> tag.
        const base64Finger = xmlDoc.getElementsByTagName("Data")[0].textContent;

        if (base64Finger) {
            mode = "thumbprint";
            // Draw it onto your existing canvas so it displays on the invoice
            loadSignature("data:image/png;base64," + base64Finger, "thumbprint");
            alert("Fingerprint Captured!");
        }
    } catch (err) {
        console.error(err);
        alert("Fingerprint device not found." + err.message);
    }
};
const canvas = document.getElementById("signature-pad");
const ctx = canvas.getContext("2d");
let drawing = false;
let mode = "signature"; // default

// Resize canvas for high DPI
function resizeCanvas() {
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = canvas.offsetHeight * ratio;
    ctx.scale(ratio, ratio);
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// Drawing functions
function startDraw(e) { drawing = true; draw(e); }
function endDraw() { drawing = false; ctx.beginPath(); }
function draw(e) {
    if (!drawing) return;
    const rect = canvas.getBoundingClientRect();
    let x = e.touches ? e.touches[0].clientX - rect.left : e.clientX - rect.left;
    let y = e.touches ? e.touches[0].clientY - rect.top : e.clientY - rect.top;

    ctx.lineWidth = (mode === "signature") ? 2 : 6; // thicker for thumbprint
    ctx.lineCap = "round";
    ctx.strokeStyle = "#000";

    ctx.lineTo(x, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y);
}

// Mouse/Touch events
canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mouseup", endDraw);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseleave", endDraw);

canvas.addEventListener("touchstart", startDraw);
canvas.addEventListener("touchend", endDraw);
canvas.addEventListener("touchmove", draw);

// Clear button
document.getElementById("clear-sign").onclick = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
};

// Toggle buttons
document.getElementById("use-signature").onclick = () => { mode = "signature"; };

// FILL ITEMS
// ================================
function fillItems(items){

const itemsList = document.getElementById("items-container");

itemsList.innerHTML = "";

items.forEach(i => {

const row = document.createElement("div");

row.className =
"item-row grid grid-cols-2 md:grid-cols-4 gap-3 p-3 bg-slate-50 rounded-lg relative";

row.innerHTML = `

<input class="form-input item-name" value="${i.name || ''}">

<input class="form-input item-gross" value="${i.grossWeight || ''}">

<input class="form-input item-net" value="${i.netWeight || ''}">

<input class="form-input item-purity" value="${i.purity || ''}">

<button type="button"
onclick="this.parentElement.remove()"
class="absolute -right-2 -top-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs no-print">

×

</button>
`;

itemsList.appendChild(row);

});

}

document.getElementById("estValue").value = val ? val.toString() : "";

// ================================
// SIGNATURE
// ================================

function loadSignature(base64, type){
    if(!base64) return;

    mode = type || "signature"; // set mode for the canvas
    const canvas = document.getElementById("signature-pad");
    const ctx = canvas.getContext("2d");
    const img = new Image();
    img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    };
    img.src = base64;
}
