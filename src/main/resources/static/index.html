<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Krishna Jewelers</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* RANKA DASHBOARD */

body{
font-family:'Poppins',sans-serif;
background:#f6f6f6;
}

.dashboard-title{
font-family:'Great Vibes',cursive;
font-size:36px;
color:#b45309;
}

/* stat cards */

.stat-card{
background:white;
border-radius:12px;
padding:20px;
display:flex;
align-items:center;
gap:16px;
border:1px solid #eee;
transition:0.25s;
}

.stat-card:hover{
box-shadow:0 6px 20px rgba(0,0,0,0.08);
transform:translateY(-2px);
}

/* stat icons */

.stat-icon{
padding:12px;
border-radius:10px;
background:#fef3c7;
color:#b45309;
}

/* table */

.table-card{
background:white;
border-radius:12px;
padding:24px;
border:1px solid #eee;
}

.table-card table th{
font-size:12px;
color:#64748b;
font-weight:500;
}

.table-card table td{
font-size:14px;
}

</style>

</head>

<body>

<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<div class="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="sidebar-container" class="sidebar"></div>

<main class="main-content">

<header class="flex justify-between items-center mb-10">

<div>

<h1 class="dashboard-title">Krishna Jewelers</h1>

<p class="text-slate-500 text-sm">
Mortgage Dashboard
</p>

</div>

<button onclick="location.href='morgate.html'" class="btn-primary flex items-center gap-2">

<i data-lucide="plus" class="w-5 h-5"></i>
New Mortgage

</button>

</header>


<!-- STATS -->

<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

<div class="stat-card">

<div class="stat-icon">
<i data-lucide="users"></i>
</div>

<div>
<p class="text-sm text-slate-500">Total Customers</p>
<h3 id="stat-customers" class="text-2xl font-semibold">--</h3>
</div>

</div>


<div class="stat-card">

<div class="stat-icon">
<i data-lucide="buffer"></i>
</div>

<div>
<p class="text-sm text-slate-500">Active Mortgages</p>
<h3 id="stat-mortgages" class="text-2xl font-semibold">--</h3>
</div>

</div>


<div class="stat-card">

<div class="stat-icon">
<i data-lucide="indian-rupee"></i>
</div>

<div>
<p class="text-sm text-slate-500">Portfolio Value</p>
<h3 id="stat-value" class="text-2xl font-semibold">₹0</h3>
</div>

</div>

</div>


<!-- RECENT TABLE -->

<div class="table-card">

<div class="flex justify-between items-center mb-6">

<h2 class="text-lg font-semibold">
Recent Mortgages
</h2>

<a href="mortgage-list.html" class="text-amber-600 text-sm font-medium hover:underline">
View All
</a>

</div>

<div class="overflow-x-auto">

<table class="w-full text-left">

<thead>

<tr class="border-b">

<th class="pb-4">FORM ID</th>
<th class="pb-4">CUSTOMER</th>
<th class="pb-4">ITEMS</th>
<th class="pb-4">EST VALUE</th>
<th class="pb-4 text-right">STATUS</th>

</tr>

</thead>

<tbody id="recent-mortgages-tbody"></tbody>

</table>

</div>

</div>

</main>


<script src="api.js"></script>

<script>

loadSidebar();
lucide.createIcons();

/* Dashboard Data */

async function initDashboard(){

try{

const customerRes = await ApiService.getAllCustomers();
const customerCount = customerRes.data ? customerRes.data.length : 0;

document.getElementById("stat-customers").innerText = customerCount;


const mortgageRes = await ApiService.getActiveMortgages();
const mortgages = mortgageRes.data || [];

document.getElementById("stat-mortgages").innerText = mortgages.length;


const totalValue = mortgages.reduce((sum,m)=>sum+(m.estValue||0),0);

document.getElementById("stat-value").innerText =
`₹${totalValue.toLocaleString("en-IN")}`;


const tbody = document.getElementById("recent-mortgages-tbody");

const recent = mortgages.slice(-5).reverse();

tbody.innerHTML = recent.map(m=>`

<tr class="border-b hover:bg-slate-50">

<td class="py-4 text-slate-500 font-mono">
#${m.id}
</td>

<td class="py-4 font-medium">
${m.customerDetails ? m.customerDetails.name : "N/A"}
</td>

<td class="py-4 text-slate-600 text-sm">
${m.itemList ? m.itemList.length : 0} items
</td>

<td class="py-4 font-medium">
₹${m.estValue || 0}
</td>

<td class="py-4 text-right">

<span class="px-3 py-1 rounded-full text-xs
${m.settled
?'bg-green-100 text-green-700'
:'bg-amber-100 text-amber-700'}">

${m.settled ? "Settled" : "Active"}

</span>

</td>

</tr>

`).join("");

}catch(err){

console.error("Dashboard Error",err);

}

}

initDashboard();

</script>

</body>
</html>
