<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Directory | Krishna Jewelers</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="api.js"></script>
<script src="sidebar.js"></script>

<style>

/* PAGE SPECIFIC STYLES ONLY */
.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.modal-close{
background:none;
border:none;
font-size:18px;
cursor:pointer;
color:#666;
}

.modal-close:hover{
color:#000;
}
.header-flex{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header-flex h1{
font-family:'Playfair Display',serif;
font-size:26px;
margin:0;
}

.search-bar{
padding:10px 20px;
border-radius:30px;
border:1px solid #e2e8f0;
width:280px;
outline:none;
}

.table-wrapper{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

thead th{
background:#f8fafc;
padding:14px;
font-size:12px;
color:#64748b;
text-transform:uppercase;
}

td{
padding:14px;
border-top:1px solid #f1f5f9;
font-size:14px;
}

tr:hover{
background:#fafafa;
}

.action-cell{
display:flex;
gap:10px;
align-items:center;
}

.btn-view{
color:#d97706;
font-weight:600;
cursor:pointer;
}

.btn-delete{
border:none;
background:none;
color:#ef4444;
cursor:pointer;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:25px;
border-radius:12px;
width:600px;
max-width:92%;
}

</style>

</head>

<body>

<!-- SIDEBAR BUTTON -->

<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<div class="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="sidebar-container" class="sidebar"></div>

<!-- LOADER -->

<div id="loader" class="loader-overlay">
<div class="spinner"></div>
</div>

<!-- MAIN CONTENT -->

<div class="main-content">

<div class="header-flex">

<h1>Customer Directory</h1>

<input
type="text"
class="search-bar"
placeholder="Search customers..."
id="searchInput"
onkeyup="filterCustomers()">

</div>

<div class="card">

<div class="table-wrapper">

<table>

<thead>
<tr>
<th>Name</th>
<th>Father</th>
<th>Phone</th>
<th>Aadhar</th>
<th>Address</th>
<th>Action</th>
</tr>
</thead>

<tbody id="customer-list"></tbody>

</table>

</div>

</div>

</div>

<!-- MORTGAGE MODAL -->
<div id="mortgageModal" class="modal" onclick="outsideClose(event)">

<div class="modal-box">

<div class="modal-header">

<h3>Customer Mortgages</h3>

<button class="modal-close" onclick="closeModal()">✕</button>

</div>

<table style="width:100%;margin-top:10px">

<thead>
<tr>
<th>ID</th>
<th>Items</th>
<th>Value</th>
<th>Status</th>
</tr>
</thead>

<tbody id="customer-mortgage-list"></tbody>

</table>

</div>

</div>

<script>

loadSidebar();
function closeModal(){
document.getElementById("mortgageModal").style.display="none";
}

function outsideClose(e){
if(e.target.id==="mortgageModal"){
closeModal();
}
}

/* ESC key close */

document.addEventListener("keydown",function(e){
if(e.key==="Escape"){
closeModal();
}
});
function showLoader(){
document.getElementById("loader").style.display="flex";
}

function hideLoader(){
document.getElementById("loader").style.display="none";
}

async function loadCustomers(){

showLoader();

const res = await ApiService.getAllCustomers();
const customers = res.data || [];

const list = document.getElementById("customer-list");
list.innerHTML="";

customers.forEach(c=>{

list.innerHTML+=`

<tr onclick="viewCustomerMortgages(${c.id})">

<td>${c.name}</td>
<td>${c.fatherName}</td>
<td>${c.phoneNumber}</td>
<td>${c.aadharNumber}</td>
<td>${c.address}</td>

<td>

<div class="action-cell">

<span class="btn-view">View</span>

<button class="btn-delete"
onclick="event.stopPropagation();deleteCustomer(${c.id})">
Delete
</button>

</div>

</td>

</tr>

`;

});

hideLoader();

}

async function viewCustomerMortgages(id){

showLoader();

const res=await ApiService.getMorgateByCustomerId(id);

const list=document.getElementById("customer-mortgage-list");
list.innerHTML="";

(res.data||[]).forEach(m=>{

const items=m.itemList?.map(i=>i.name).join(", ");

list.innerHTML+=`

<tr>

<td>${m.id}</td>
<td>${items}</td>
<td>₹${m.estValue}</td>

<td>${m.settled ? 'Settled' : 'Pending'}</td>

</tr>

`;

});

document.getElementById("mortgageModal").style.display="flex";

hideLoader();

}

function filterCustomers(){

const val=document.getElementById("searchInput").value.toUpperCase();

document.querySelectorAll("#customer-list tr").forEach(r=>{
r.style.display=r.innerText.toUpperCase().includes(val)?'':'none';
});

}

async function deleteCustomer(id){

if(!confirm("Delete this customer?")) return;

await ApiService.deleteCustomer(id);
loadCustomers();

}

loadCustomers();

</script>

</body>
</html>
